services:
  api:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      API_PORT: "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
